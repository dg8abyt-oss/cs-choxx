<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Browser</title>
    <style>
        /* Reset margins and make the app full screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
        }

        /* Main browser layout */
        .browser-window {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* The Top Address Bar (Browser Chrome) */
        .browser-header {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background-color: #e5e7eb;
            border-bottom: 1px solid #d1d5db;
            gap: 15px;
        }

        /* Fake macOS style window buttons just for looks */
        .window-controls {
            display: flex;
            gap: 8px;
            margin-right: 10px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        /* Address input field */
        .address-bar {
            flex-grow: 1;
            display: flex;
            background: white;
            border-radius: 20px;
            border: 1px solid #ccc;
            overflow: hidden;
            padding: 5px 15px;
        }
        
        .address-bar input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 5px;
            font-size: 14px;
        }

        .go-button {
            background: none;
            border: none;
            cursor: pointer;
            color: #4b5563;
            font-weight: bold;
            padding: 5px 10px;
        }

        .go-button:hover {
            color: #000;
        }

        /* The viewing area */
        .browser-body {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            position: relative;
        }

        /* Ensure the injected iframe takes up the whole screen */
        .browser-body iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-message {
            color: #6b7280;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="browser-window">
        <div class="browser-header">
            <div class="window-controls">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            
            <div class="address-bar">
                <input 
                    type="text" 
                    id="targetUrl" 
                    placeholder="Enter URL (e.g., https://wikipedia.org)" 
                    autocomplete="off"
                >
                <button class="go-button" onclick="loadIframe()">Go</button>
            </div>
        </div>

        <div class="browser-body" id="iframe-container">
            <div class="status-message">Ready to browse. Enter a URL above.</div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('targetUrl');
        const container = document.getElementById('iframe-container');

        // Listen for the "Enter" key in the input field
        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadIframe();
            }
        });

        async function loadIframe() {
            let url = urlInput.value.trim();

            if (!url) return;

            // Simple check to ensure the URL has http:// or https://
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                urlInput.value = url; // Update the address bar to reflect the change
            }

            container.innerHTML = '<div class="status-message">Loading...</div>';

            try {
                // Call your serverless function
                const response = await fetch(`/api/get-iframe?url=${encodeURIComponent(url)}`);
                const content = await response.text();

                if (response.ok) {
                    // Inject the iframe HTML returned by your API
                    container.innerHTML = content;
                } else {
                    container.innerHTML = `<div class="status-message" style="color: red;">Error: ${content}</div>`;
                }
            } catch (error) {
                console.error("Fetch error:", error);
                container.innerHTML = '<div class="status-message" style="color: red;">Network error. Check console.</div>';
            }
        }
    </script>
</body>
</html>
